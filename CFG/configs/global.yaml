experiment:
  name: "KART_Flow_Full"

model:
  model_size: "small"
  kart_nodes: 128
  kart_harmonics: 6

training:
  batch_size: 256
  gradient_accumulation_steps: 2
  epochs: 400
  learning_rate: 0.0001
  weight_decay: 0.0001
  use_scheduler: true
  scheduler_type: "cosine_with_warmup" 
  warmup_epochs: 20
  min_lr: 0.000001
  save_every: 25
  multi_gpu: true    
  endpoint_weight: 0.1
  ema_decay: 0.9999
  eval_every: 50
  eval_samples: 10000
  eval_batch_size: 128
  ref_stat_path: "validation"

inference:
  num_samples: 64

cfg:
  num_classes: 10
  p_uncond: 0.1
  guidance_scale: 3.0
